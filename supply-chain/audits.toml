
# cargo-vet audits file

[[audits.crc32c]]
who = "CDF maintainers <maintainers@cdf.invalid>"
criteria = "safe-to-deploy"
version = "0.6.8"
notes = "Reviewed all source and build code. Runtime capability is limited to CRC32C over caller-owned byte slices and optional Read/Write wrappers. Hardware paths are gated by runtime feature detection and target_feature; aligned u64 views are constructed only after bounded split/alignment checks, preserve slice lifetime, and do not write through shared input. Parallel hardware loops derive three nonempty equal blocks from fixed LONG/SHORT chunk constants. The build script writes generated lookup tables only beneath Cargo OUT_DIR. No network, ambient filesystem, process, environment-secret, or FFI capability. Selected to remove Snappy frame checksum copies while retaining software fallback."

[[audits.maybe-owned]]
who = "CDF maintainers <maintainers@cdf.invalid>"
criteria = "safe-to-deploy"
version = "0.3.4"
notes = "Reviewed complete 0.3.4 source and manifest. Safe enum/reference ownership utilities and generated operator impls only; no unsafe, FFI, build script, filesystem, network, process, or ambient authority. Used transitively by cap-primitives."

[[audits.sha2-asm]]
who = "CDF maintainers <maintainers@cdf.invalid>"
criteria = "safe-to-deploy"
version = "0.6.4"
notes = "Reviewed no_std FFI wrapper, build script, and architecture assembly entry points. Safe wrappers pass fixed-size state/block references; assembly accesses only those fixed buffers and bounded stack frames. No runtime filesystem, network, environment, or allocator capability. Enabled for hardware SHA-256 after a measured 5.6x rate improvement on arm64."

