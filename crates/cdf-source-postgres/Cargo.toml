[package]
name = "cdf-source-postgres"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Postgres source adapter for cdf."

[dependencies]
arrow-array = "59.1.0"
arrow-schema = "59.1.0"
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-http = { path = "../cdf-http" }
cdf-postgres = { path = "../cdf-postgres" }
cdf-runtime = { path = "../cdf-runtime" }
futures-util = "0.3.32"
postgres = "0.19"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
url = "2.5.8"

[dev-dependencies]
futures-executor = "0.3.32"
