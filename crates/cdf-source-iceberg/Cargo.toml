[package]
name = "cdf-source-iceberg"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Apache Iceberg source adapter for cdf."

[dependencies]
arrow-schema = "58.3.0"
cdf-kernel = { path = "../cdf-kernel" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-task-store = { path = "../cdf-task-store" }
iceberg = { git = "https://github.com/apache/iceberg-rust.git", rev = "db4f6091850814b83989721afe12aa9e4406d6b3" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
cdf-memory = { path = "../cdf-memory" }
tempfile = "3.27.0"
