[package]
name = "cdf-source-iceberg"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Apache Iceberg source adapter for cdf."

[dependencies]
apache-avro = "0.21.0"
async-trait = "0.1.91"
arrow-array = "58.3.0"
arrow-schema = "58.3.0"
aws-credential-types = { version = "1.3.0", features = ["hardcoded-credentials"] }
aws-sigv4 = { version = "1.5.1", default-features = false, features = ["http1", "sign-http"] }
bytes = "1.11.0"
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-object-access = { path = "../cdf-object-access" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-task-store = { path = "../cdf-task-store" }
futures-channel = "0.3.32"
futures-util = "0.3.32"
flate2 = "1.1.9"
hex = "0.4.3"
iceberg = { git = "https://github.com/apache/iceberg-rust.git", rev = "db4f6091850814b83989721afe12aa9e4406d6b3" }
rusqlite = { version = "0.40.1", default-features = false, features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["raw_value"] }
sha2 = "0.10.9"
url = "2.5.8"
zeroize = { version = "1.8.2", features = ["derive"] }
typetag = "0.2.23"

[dev-dependencies]
cdf-contract = { path = "../cdf-contract" }
cdf-engine = { path = "../cdf-engine" }
cdf-package = { path = "../cdf-package" }
futures-executor = "0.3.32"
parquet = { version = "58.3.0", default-features = false, features = ["arrow"] }
tempfile = "3.27.0"
tokio = { version = "=1.52.3", features = ["rt-multi-thread", "time"] }
