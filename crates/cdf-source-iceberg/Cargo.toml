[package]
name = "cdf-source-iceberg"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Apache Iceberg source adapter for cdf."

[dependencies]
arrow-schema = "58.3.0"
aws-credential-types = { version = "1.3.0", features = ["hardcoded-credentials"] }
aws-sigv4 = { version = "1.5.1", default-features = false, features = ["http1", "sign-http"] }
bytes = "1.11.0"
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-object-access = { path = "../cdf-object-access" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-task-store = { path = "../cdf-task-store" }
futures-util = "0.3.32"
hex = "0.4.3"
iceberg = { git = "https://github.com/apache/iceberg-rust.git", rev = "db4f6091850814b83989721afe12aa9e4406d6b3" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
url = "2.5.8"
zeroize = { version = "1.8.2", features = ["derive"] }

[dev-dependencies]
tempfile = "3.27.0"
tokio = { version = "=1.52.3", features = ["rt-multi-thread", "time"] }
