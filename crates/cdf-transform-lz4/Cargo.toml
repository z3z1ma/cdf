[package]
name = "cdf-transform-lz4"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Native streaming LZ4 frame byte transform for cdf."

[dependencies]
bytes = "1.11.0"
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-runtime = { path = "../cdf-runtime" }
futures-util = "0.3.32"
lz4_flex = "0.13.1"
twox-hash = { version = "2.1.2", default-features = false, features = ["xxhash32"] }

[dev-dependencies]
futures-executor = "0.3.32"
