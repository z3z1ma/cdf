[package]
name = "cdf-task-store"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Bounded content-addressed task-set artifacts for cdf planners."

[dependencies]
bytes = "1.11.0"
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-runtime = { path = "../cdf-runtime" }
hex = "0.4.3"
sha2 = { version = "0.10.9", features = ["asm"] }
tempfile = "3.27.0"

[dev-dependencies]
futures-executor = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
