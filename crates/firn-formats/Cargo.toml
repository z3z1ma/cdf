[package]
name = "firn-formats"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "External data format boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-csv = "59.0.0"
arrow-ipc = { version = "59.0.0", features = ["lz4"] }
arrow-json = "59.0.0"
arrow-schema = "59.0.0"
firn-contract = { path = "../firn-contract" }
firn-kernel = { path = "../firn-kernel" }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"

[dev-dependencies]
firn-package = { path = "../firn-package" }
tempfile = "3.27.0"
