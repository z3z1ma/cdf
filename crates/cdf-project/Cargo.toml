[package]
name = "cdf-project"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Project configuration and orchestration boundary for cdf."

[dependencies]
arrow-array = "59.1.0"
arrow-cast = "59.1.0"
arrow-schema = "59.1.0"
cdf-contract = { path = "../cdf-contract" }
cdf-declarative = { path = "../cdf-declarative" }
cdf-engine = { path = "../cdf-engine" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-package = { path = "../cdf-package" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-state-sqlite = { path = "../cdf-state-sqlite" }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
toml = "1.1.2"
tracing = "0.1.44"
futures-executor = "0.3.32"

[dev-dependencies]
arrow-array = "59.1.0"
arrow-ipc = "59.1.0"
cdf-dest-duckdb = { path = "../cdf-dest-duckdb" }
cdf-dest-parquet = { path = "../cdf-dest-parquet" }
cdf-dest-postgres = { path = "../cdf-dest-postgres" }
cdf-format-arrow-ipc = { path = "../cdf-format-arrow-ipc" }
cdf-format-parquet = { path = "../cdf-format-parquet" }
flate2 = "1.1.9"
object_store = { git = "https://github.com/apache/arrow-rs-object-store.git", rev = "c7316d29face118e7409eead0cda098f38589428" }
postgres = "0.19"
tempfile = "3.27.0"
