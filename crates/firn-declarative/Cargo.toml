[package]
name = "firn-declarative"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Declarative resource authoring boundary for firn."

[dependencies]
arrow-schema = "59.0.0"
firn-http = { path = "../firn-http" }
firn-formats = { path = "../firn-formats" }
firn-kernel = { path = "../firn-kernel" }
hex = "0.4.3"
schemars = { version = "1.2.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml = "0.9.34"
sha2 = "0.10.9"
toml = "1.1.2"

[dev-dependencies]
firn-conformance = { path = "../firn-conformance" }
futures-executor = "0.3.32"
