[package]
name = "firn-python"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Optional Python authoring and interchange boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-ipc = { version = "59.0.0", features = ["lz4"] }
arrow-schema = "59.0.0"
firn-formats = { path = "../firn-formats" }
firn-http = { path = "../firn-http" }
firn-kernel = { path = "../firn-kernel" }
hex = "0.4.3"
pyo3 = { version = "0.29.0", features = ["auto-initialize"] }
pyo3-arrow = { version = "0.19.0", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
