[package]
name = "firn-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Command-line entry point for firn."

[dependencies]
firn-contract = { path = "../firn-contract" }
firn-declarative = { path = "../firn-declarative" }
firn-dest-duckdb = { path = "../firn-dest-duckdb" }
firn-dest-postgres = { path = "../firn-dest-postgres" }
firn-engine = { path = "../firn-engine" }
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
firn-project = { path = "../firn-project" }
firn-state-sqlite = { path = "../firn-state-sqlite" }
futures-executor = "0.3.32"
futures-util = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
