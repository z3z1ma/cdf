[package]
name = "firn-dest-parquet"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Parquet object-store destination boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-schema = "59.0.0"
duckdb = { version = "1.10504.0", features = ["bundled", "parquet"] }
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
hex = "0.4.3"
object_store = "0.13.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
tempfile = "3.27.0"
tokio = { version = "1.48.0", features = ["rt"] }
