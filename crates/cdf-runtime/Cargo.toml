[package]
name = "cdf-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Engine-neutral runtime contracts and extension registries for cdf."

[dependencies]
arrow-array = "58.3.0"
arrow-schema = { version = "58.3.0", features = ["serde"] }
bytes = "1.11.0"
cdf-http = { path = "../cdf-http" }
cdf-foreign-stream = { path = "../cdf-foreign-stream" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-package-contract = { path = "../cdf-package-contract" }
futures-channel = { version = "0.3.32", features = ["sink"] }
futures-executor = "0.3.32"
futures-util = { version = "0.3.32", features = ["sink"] }
hex = "0.4.3"
http = "1.4.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"

[dev-dependencies]
futures-util = "0.3.32"
tempfile = "3.27.0"
