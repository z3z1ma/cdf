[package]
name = "cdf-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Engine-neutral runtime contracts and extension registries for cdf."

[dependencies]
arrow-schema = "59.1.0"
cdf-contract = { path = "../cdf-contract" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-package = { path = "../cdf-package" }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
serde_json = "1.0.150"
