[package]
name = "cdf-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Engine-neutral runtime contracts and extension registries for cdf."

[dependencies]
arrow-array = "59.1.0"
arrow-schema = { version = "59.1.0", features = ["serde"] }
cdf-contract = { path = "../cdf-contract" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-package = { path = "../cdf-package" }
futures-channel = { version = "0.3.32", features = ["sink"] }
futures-util = { version = "0.3.32", features = ["sink"] }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"

[dev-dependencies]
bytes = "1.11.0"
futures-executor = "0.3.32"
futures-util = "0.3.32"
tempfile = "3.27.0"
