[package]
name = "firn-state-sqlite"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SQLite checkpoint store boundary for firn."

[dependencies]
firn-kernel = { path = "../firn-kernel" }
rusqlite = { version = "0.40.1", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
firn-conformance = { path = "../firn-conformance" }
tempfile = "3.27.0"
