[package]
name = "cdf-state-sqlite"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "SQLite checkpoint store boundary for cdf."

[dependencies]
cdf-kernel = { path = "../cdf-kernel" }
rusqlite = { version = "0.40.1", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
cdf-conformance = { path = "../cdf-conformance" }
tempfile = "3.27.0"
