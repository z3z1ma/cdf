[package]
name = "firn-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Planning and execution boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-schema = "59.0.0"
arrow-select = "59.0.0"
datafusion = { version = "54.0.0", default-features = false }
firn-contract = { path = "../firn-contract" }
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
futures-util = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
futures-executor = "0.3.32"
serde_json = "1.0.150"
tempfile = "3.27.0"
