[package]
name = "firn-dest-postgres"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Postgres destination boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-schema = "59.0.0"
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
postgres = "0.19"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
tempfile = "3.27.0"
