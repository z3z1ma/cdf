[package]
name = "firn-project"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Project configuration and orchestration boundary for firn."

[dependencies]
firn-contract = { path = "../firn-contract" }
firn-declarative = { path = "../firn-declarative" }
firn-dest-duckdb = { path = "../firn-dest-duckdb" }
firn-http = { path = "../firn-http" }
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
toml = "1.1.2"

[dev-dependencies]
arrow-array = "59.0.0"
arrow-schema = "59.0.0"
firn-state-sqlite = { path = "../firn-state-sqlite" }
tempfile = "3.27.0"
