[package]
name = "firn-package"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Package builder and reader boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-ipc = { version = "59.0.0", features = ["lz4"] }
arrow-schema = "59.0.0"
firn-kernel = { path = "../firn-kernel" }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"

[dev-dependencies]
tempfile = "3.27.0"
