[package]
name = "cdf-python"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Optional Python authoring and interchange boundary for cdf."

[dependencies]
arrow-array = "59.1.0"
arrow-ipc = { version = "59.1.0", features = ["lz4"] }
arrow-schema = "59.1.0"
cdf-formats = { path = "../cdf-formats" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
hex = "0.4.3"
pyo3 = { version = "0.29.0", features = ["auto-initialize"] }
pyo3-arrow = { version = "0.19.0", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
