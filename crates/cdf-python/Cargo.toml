[package]
name = "cdf-python"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Optional Python authoring and interchange boundary for cdf."

[dependencies]
arrow-array = { version = "58.3.0", features = ["ffi"] }
arrow-ipc = { version = "58.3.0", features = ["lz4"] }
arrow-json = "58.3.0"
arrow-schema = "58.3.0"
cdf-http = { path = "../cdf-http" }
cdf-foreign-stream = { path = "../cdf-foreign-stream" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-subprocess = { path = "../cdf-subprocess" }
futures-util = "0.3.32"
hex = "0.4.3"
pyo3 = { version = "0.29.0", features = ["auto-initialize"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"

[dev-dependencies]
arrow-data = "58.3.0"
cdf-engine = { path = "../cdf-engine" }
