[package]
name = "cdf-source-glue"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "AWS Glue conventional external-table source adapter for cdf."

[dependencies]
arrow-array = "58.3.0"
arrow-cast = "58.3.0"
arrow-schema = "58.3.0"
bytes = "1.11.0"
cdf-aws = { path = "../cdf-aws" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-object-access = { path = "../cdf-object-access" }
cdf-runtime = { path = "../cdf-runtime" }
cdf-task-store = { path = "../cdf-task-store" }
futures-util = "0.3.32"
futures-channel = "0.3.32"
rusqlite = { version = "0.40.1", default-features = false, features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
url = "2.5.8"

[dev-dependencies]
cdf-engine = { path = "../cdf-engine" }
cdf-format-json = { path = "../cdf-format-json" }
cdf-format-parquet = { path = "../cdf-format-parquet" }
futures-executor = "0.3.32"
parquet = { version = "58.3.0", default-features = false, features = ["arrow"] }
tempfile = "3.27.0"
tokio = { version = "=1.52.3", features = ["rt-multi-thread", "time"] }
