[package]
name = "firn-dest-duckdb"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "DuckDB destination boundary for firn."

[dependencies]
arrow-array = "59.0.0"
arrow-schema = "59.0.0"
duckdb = { version = "1.10504.0", features = ["bundled"] }
firn-kernel = { path = "../firn-kernel" }
firn-package = { path = "../firn-package" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
firn-conformance = { path = "../firn-conformance" }
tempfile = "3.27.0"
