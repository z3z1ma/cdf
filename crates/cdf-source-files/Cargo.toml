[package]
name = "cdf-source-files"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "File and object-store source adapter for cdf."

[dependencies]
arrow-schema = "59.1.0"
cdf-contract = { path = "../cdf-contract" }
cdf-formats = { path = "../cdf-formats" }
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-runtime = { path = "../cdf-runtime" }
futures-util = "0.3.32"
hex = "0.4.3"
object_store = { version = "0.13.2", features = ["aws", "azure", "gcp"] }
schemars = { version = "1.2.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
tempfile = "3.27.0"
tokio = { version = "=1.52.3", features = ["fs", "io-util"] }
url = "2.5.8"

[dev-dependencies]
cdf-engine = { path = "../cdf-engine" }
flate2 = "1.1.9"
futures-executor = "0.3.32"
