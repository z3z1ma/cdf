[package]
name = "cdf-source-files"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "File and object-store source adapter for cdf."

[dependencies]
arrow-schema = "59.1.0"
bytes = "1.11.0"
cdf-http = { path = "../cdf-http" }
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-runtime = { path = "../cdf-runtime" }
futures-util = "0.3.32"
hex = "0.4.3"
object_store = { git = "https://github.com/apache/arrow-rs-object-store.git", rev = "c7316d29face118e7409eead0cda098f38589428", features = ["aws", "azure", "gcp"] }
schemars = { version = "1.2.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
tempfile = "3.27.0"
tokio = { version = "=1.52.3", features = ["fs", "io-util"] }
url = "2.5.8"

[dev-dependencies]
arrow-array = "59.1.0"
arrow-ipc = "59.1.0"
cdf-format-arrow-ipc = { path = "../cdf-format-arrow-ipc" }
cdf-format-delimited = { path = "../cdf-format-delimited" }
cdf-format-json = { path = "../cdf-format-json" }
cdf-format-parquet = { path = "../cdf-format-parquet" }
cdf-package = { path = "../cdf-package" }
cdf-transform-gzip = { path = "../cdf-transform-gzip" }
flate2 = "1.1.9"
futures-executor = "0.3.32"
parquet = "59.1.0"
tokio = { version = "=1.52.3", features = ["rt-multi-thread"] }
