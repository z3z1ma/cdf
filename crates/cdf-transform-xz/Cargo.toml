[package]
name = "cdf-transform-xz"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false
description = "Native streaming xz byte transform for cdf."

[dependencies]
bytes = "1.11.0"
cdf-kernel = { path = "../cdf-kernel" }
cdf-memory = { path = "../cdf-memory" }
cdf-runtime = { path = "../cdf-runtime" }
futures-util = "0.3.32"
liblzma = { version = "0.4.7", default-features = false, features = ["static"] }

[dev-dependencies]
futures-executor = "0.3.32"
