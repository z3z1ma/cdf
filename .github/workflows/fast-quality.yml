name: Fast Quality

on:
  pull_request:
  push:

concurrency:
  group: fast-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-smoke:
    name: Core Rust smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fast-core

      - name: Locked metadata
        run: cargo metadata --format-version 1 --locked --no-deps >/dev/null

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Core Clippy
        run: >-
          cargo clippy
          -p cdf-kernel
          -p cdf-contract
          -p cdf-package
          -p cdf-formats
          -p cdf-engine
          --lib
          --locked
          -- -D warnings

      - name: Core library tests
        run: >-
          cargo test
          -p cdf-kernel
          -p cdf-contract
          -p cdf-package
          -p cdf-formats
          --lib
          --locked
          --no-fail-fast

  source-secrets:
    name: Tracked-source secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.18.4
          GITLEAKS_SHA256: ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          bin_dir="$RUNNER_TEMP/gitleaks-bin"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --status
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" gitleaks
          echo "$bin_dir" >> "$GITHUB_PATH"

      - name: Scan tracked source
        run: |
          source_tree="$(mktemp -d)"
          trap 'rm -rf "$source_tree"' EXIT
          git archive --format=tar HEAD | tar -xf - -C "$source_tree"
          gitleaks detect --no-git --source "$source_tree" --no-banner --redact
